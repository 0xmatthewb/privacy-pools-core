# Privacy Pools - Static skill and docs validation
# Checks that skill files contain required strings/patterns.
# Run: yarn eval:static

description: "Privacy Pools - Static skill and docs validation"

providers:
  # Custom provider that reads the skill file path from the prompt
  # and returns its content as the output for assertion checks.
  - id: file://helpers/skill-provider.js

prompts:
  - "{{skillPath}}"

tests:
  - tests/static/integration-skill.yaml
  - tests/static/deposit-skill.yaml
  - tests/static/withdraw-skill.yaml
  - tests/static/ragequit-skill.yaml
