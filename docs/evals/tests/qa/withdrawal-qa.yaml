# QA: Root types
# Tests understanding of state root vs ASP root.

- description: "Distinguishes state root from ASP root"
  vars:
    question: "What is the difference between state root and ASP root?"
    context: file://helpers/context-withdrawal-asp.js
  assert:
    - type: javascript
      value: |
        const text = String(vars.output || output);
        const required = [
          /state root/i,
          /ASP root/i,
          /currentRoot/i,
          /latestRoot/i,
        ];
        const hasTreeContents = /commitment hashes|approved labels/i.test(text);
        const passed = required.every((re) => re.test(text)) && hasTreeContents;
        return {
          pass: passed,
          score: passed ? 1 : 0,
          reason: passed
            ? 'Distinguishes the pool currentRoot from the ASP latestRoot and tree contents'
            : 'Missing state root, ASP root, or tree-content distinction',
        };

- description: "Knows processooor must be entrypointAddress for relayed withdrawal"
  vars:
    question: "What should processooor be set to for relayed withdrawal?"
    context: file://helpers/context-withdrawal-relayer.js
  assert:
    - type: javascript
      value: |
        const text = String(vars.output || output);
        const hasProcessooor = /processooor/i.test(text);
        const hasEntrypoint = /entrypointAddress|Entrypoint.*address/i.test(text);
        const hasRelay = /relay/i.test(text);
        const passed = hasProcessooor && hasEntrypoint && hasRelay;
        return {
          pass: passed,
          score: passed ? 1 : 0,
          reason: passed
            ? 'Mentions processooor, entrypointAddress, and relayed withdrawal'
            : 'Missing processooor, entrypointAddress, or relayed withdrawal reference',
        };
