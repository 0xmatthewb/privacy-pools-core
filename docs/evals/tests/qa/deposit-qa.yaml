# QA: Deposit persistence
# Tests that the LLM knows what to persist after deposit.

- description: "Knows what to persist after a successful deposit"
  vars:
    question: "What should I persist after a successful deposit?"
    context: file://helpers/context-deposit.js
  assert:
    - type: javascript
      value: |
        const text = String(vars.output || output);
        const required = [
          /label/i,
          /committedValue|committed value/i,
          /nullifier/i,
          /secret/i,
          /depositIndex|deposit index/i,
        ];
        const passed = required.every((re) => re.test(text));
        return {
          pass: passed,
          score: passed ? 1 : 0,
          reason: passed
            ? 'Mentions label, committedValue, nullifier, secret, and depositIndex'
            : 'Missing one or more required deposit persistence fields',
        };

- description: "Knows raw amount differs from committed value due to vetting fee"
  vars:
    question: "What happens if I use the raw deposit amount instead of the committed value?"
    context: file://helpers/context-deposit.js
  assert:
    - type: javascript
      value: |
        const text = String(vars.output || output);
        const hasCommittedValue = /committedValue|committed value/i.test(text);
        const hasVettingFee = /vettingFeeBPS|vetting fee|post-fee/i.test(text);
        const hasRawAmount = /raw deposit amount|raw amount|original amount/i.test(text);
        const passed = hasCommittedValue && hasVettingFee && hasRawAmount;
        return {
          pass: passed,
          score: passed ? 1 : 0,
          reason: passed
            ? 'Mentions committedValue, raw amount, and vetting fee'
            : 'Missing committedValue, raw amount, or vetting fee reference',
        };
