# QA: Quote invalidation
# Tests understanding of what invalidates a relayer quote.

- description: "Knows what invalidates a relayer quote"
  vars:
    question: "What invalidates a relayer quote?"
    context: file://helpers/context-relayer-withdrawal.js
  assert:
    - type: javascript
      value: |
        const out = String(vars.output || output);
        const triggers = [/amount/i, /recipient/i, /relayer/i];
        const count = triggers.filter(r => r.test(out)).length;
        const pass = count >= 2;
        return { pass, score: pass ? 1 : 0, reason: pass ? `Mentions ${count} invalidation triggers` : `Only mentions ${count}/2 required invalidation triggers (amount, recipient, relayer)` };
    - type: javascript
      value: |
        const out = String(vars.output || output);
        const has = /expir|TTL|timeout/i.test(out);
        return { pass: has, score: has ? 1 : 0, reason: has ? 'Mentions expiration' : 'Missing expiration/TTL/timeout reference' };
