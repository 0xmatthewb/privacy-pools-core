# QA: Quote invalidation
# Tests understanding of what invalidates a relayer quote.

- description: "Knows what invalidates a relayer quote"
  vars:
    question: "What invalidates a relayer quote?"
    context: file://helpers/context-relayer-withdrawal.js
  assert:
    - type: javascript
      value: |
        const text = String(vars.output || output);
        const required = [
          /amount/i,
          /recipient/i,
          /relayer/i,
          /extra\s*gas|extraGas/i,
          /60 seconds|TTL|expiration/i,
        ];
        const passed = required.every((re) => re.test(text));
        return {
          pass: passed,
          score: passed ? 1 : 0,
          reason: passed
            ? 'Mentions amount, recipient, relayer, extraGas, and expiration'
            : 'Missing one or more relayer quote invalidation triggers',
        };
    - type: javascript
      value: |
        const text = String(vars.output || output);
        const hasRequote = /re-quote|discard/i.test(text);
        return {
          pass: hasRequote,
          score: hasRequote ? 1 : 0,
          reason: hasRequote
            ? 'Mentions re-quoting after a change'
            : 'Missing re-quote or discard guidance',
        };
