# Static checks for the ragequit skill file.
# The custom provider reads the skill file content; assertions check for required patterns.

- description: "Ragequit skill mentions public exit or public on-chain"
  vars:
    skillPath: "privacy-pools-ragequit/SKILL.md"
  assert:
    - type: icontains-any
      value:
        - "public exit"
        - "public on-chain"

- description: "Ragequit skill mentions original depositor restriction"
  vars:
    skillPath: "privacy-pools-ragequit/SKILL.md"
  assert:
    - type: icontains-any
      value:
        - "original depositor"
        - "OnlyOriginalDepositor"

- description: "Ragequit skill mentions mutual exclusivity with private withdrawal"
  vars:
    skillPath: "privacy-pools-ragequit/SKILL.md"
  assert:
    - type: icontains
      value: "cannot"
    - type: icontains-any
      value:
        - "privately withdrawn"
        - "private withdrawal"

- description: "Ragequit skill mentions NullifierAlreadySpent"
  vars:
    skillPath: "privacy-pools-ragequit/SKILL.md"
  assert:
    - type: contains
      value: "NullifierAlreadySpent"

- description: "Ragequit skill mentions unconditional availability (no ASP)"
  vars:
    skillPath: "privacy-pools-ragequit/SKILL.md"
  assert:
    - type: icontains-any
      value:
        - "unconditional"
        - "no ASP"
