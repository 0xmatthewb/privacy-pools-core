        const has = /processooor|entrypointAddress/i.test(content);
        return { pass: has, score: has ? 1 : 0, reason: has ? 'Found processooor/entrypointAddress' : 'Missing "processooor" or "entrypointAddress"' };

- description: "Withdraw skill mentions both state root and ASP root"
  vars: {}
  assert:
    - type: javascript
      value: |
        const fs = require('fs');
        const path = require('path');
        const content = fs.readFileSync(
          path.resolve(__dirname, '../../../../static/agent-skills/privacy-pools-withdraw/SKILL.md'),
          'utf-8'
        );
        const hasState = /state root/i.test(content);
        const hasASP = /ASP root/i.test(content);
        const pass = hasState && hasASP;
        return { pass, score: pass ? 1 : 0, reason: pass ? 'Found both state root and ASP root' : `Missing: ${!hasState ? 'state root ' : ''}${!hasASP ? 'ASP root' : ''}` };

