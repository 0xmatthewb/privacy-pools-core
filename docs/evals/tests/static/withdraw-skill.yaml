# Static checks for the withdraw skill file.
# The custom provider reads the repo-local hosted copy; assertions check for required patterns.

- description: "Withdraw skill mentions Entrypoint.relay"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-withdraw/SKILL.md"
  assert:
    - type: icontains
      value: "Entrypoint.relay"

- description: "Withdraw skill mentions processooor or entrypointAddress"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-withdraw/SKILL.md"
  assert:
    - type: icontains-any
      value:
        - "processooor"
        - "entrypointAddress"

- description: "Withdraw skill mentions both state root and ASP root"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-withdraw/SKILL.md"
  assert:
    - type: icontains
      value: "state root"
    - type: icontains
      value: "ASP root"

- description: "Withdraw skill mentions quote re-quoting or expiration"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-withdraw/SKILL.md"
  assert:
    - type: icontains-any
      value:
        - "re-quote"
        - "quote expires"
        - "60 seconds"

- description: "Withdraw skill mentions change commitment"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-withdraw/SKILL.md"
  assert:
    - type: icontains
      value: "change commitment"

- description: "Withdraw skill mentions withdrawal.data client-side encoding"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-withdraw/SKILL.md"
  assert:
    - type: icontains
      value: "withdrawal.data"

- description: "Withdraw skill mentions feeCommitment"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-withdraw/SKILL.md"
  assert:
    - type: icontains
      value: "feeCommitment"

- description: "Withdraw skill differentiates production and testnet relayer hosts"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-withdraw/SKILL.md"
  assert:
    - type: contains
      value: "fastrelay.xyz"
    - type: contains
      value: "testnet-relayer.privacypools.com"
