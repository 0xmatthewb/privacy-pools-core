# Static checks for the withdraw skill file.
# Validates that SKILL.md contains required withdrawal-related content.

- description: "Withdraw skill mentions Entrypoint.relay"
  vars: {}
  assert:
    - type: javascript
      value: |
        const fs = require('fs');
        const path = require('path');
        const content = fs.readFileSync(
          path.resolve(__dirname, '../../../../static/agent-skills/privacy-pools-withdraw/SKILL.md'),
          'utf-8'
        );
        const has = /Entrypoint\.relay/i.test(content);
        return { pass: has, score: has ? 1 : 0, reason: has ? 'Found Entrypoint.relay reference' : 'Missing "Entrypoint.relay"' };

- description: "Withdraw skill mentions processooor or entrypointAddress"
  vars: {}
  assert:
    - type: javascript
      value: |
        const fs = require('fs');
