- description: "Agent skill manifest stays aligned with the documented workflows"
  vars:
    filePath: "docs/agent-skills/manifest.json"
  assert:
    - type: javascript
      value: |
        const manifest = JSON.parse(String(output));
        const expected = {
          'privacy-pools-integration': {
            docsRoutes: ['/build/integration', '/build/start', '/protocol/deposit', '/protocol/withdrawal', '/protocol/ragequit', '/deployments'],
            readOrder: ['/build/integration', '/protocol/deposit', '/protocol/withdrawal', '/protocol/ragequit', '/deployments'],
          },
          'privacy-pools-deposit': {
            docsRoutes: ['/protocol/deposit', '/reference/sdk', '/reference/errors', '/deployments'],
            readOrder: ['/protocol/deposit', '/reference/sdk', '/deployments'],
          },
          'privacy-pools-withdraw': {
            docsRoutes: ['/protocol/withdrawal', '/reference/relayer-api', '/reference/asp-api', '/reference/sdk', '/reference/errors', '/deployments'],
            readOrder: ['/protocol/withdrawal', '/reference/relayer-api', '/reference/asp-api', '/reference/sdk', '/deployments'],
          },
          'privacy-pools-ragequit': {
            docsRoutes: ['/protocol/ragequit', '/reference/sdk', '/reference/errors', '/deployments'],
            readOrder: ['/protocol/ragequit', '/reference/sdk', '/deployments'],
          },
        };

        const byName = new Map((manifest.skills || []).map((skill) => [skill.name, skill]));
        const missingSkills = Object.keys(expected).filter((name) => !byName.has(name));
        const mismatched = Object.entries(expected).filter(([name, config]) => {
          const skill = byName.get(name);
          if (!skill) return false;
          const docsRoutes = config.docsRoutes.every((route) => skill.docsRoutes.includes(route));
          const readOrder = JSON.stringify(skill.readOrder) === JSON.stringify(config.readOrder);
          return !docsRoutes || !readOrder;
        });

        const passed = (manifest.skills || []).length === Object.keys(expected).length && missingSkills.length === 0 && mismatched.length === 0;
        return {
          pass: passed,
          score: passed ? 1 : 0,
          reason: passed
            ? 'Manifest covers the expected skills and routes'
            : `Missing skills: ${missingSkills.join(', ')}; mismatched: ${mismatched.map(([name]) => name).join(', ')}`,
        };
