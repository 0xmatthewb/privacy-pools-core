# Static checks for the agent-facing docs and repo entry points.

- description: "AGENTS.md points agents to the key docs and mirrored skills"
  vars:
    filePath: "AGENTS.md"
  assert:
    - type: javascript
      value: |
        const text = String(output);
        const required = [
          'docs/docs/build/integration.md',
          'docs/docs/build/agents.md',
          'docs/docs/build/skills.md',
          'docs/docs/deployments.md',
          '.agents/skills/',
          'docs/static/agent-skills/',
          'privacy-pools-integration',
          'privacy-pools-deposit',
          'privacy-pools-withdraw',
          'privacy-pools-ragequit',
        ];
        const missing = required.filter((value) => !text.includes(value));
        return {
          pass: missing.length === 0,
          score: missing.length === 0 ? 1 : 0,
          reason: missing.length === 0
            ? 'AGENTS.md covers the expected entry points'
            : `Missing: ${missing.join(', ')}`,
        };

