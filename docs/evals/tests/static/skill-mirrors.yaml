# Static checks that the repo-local and hosted skill files stay identical.

- description: "Integration skill mirror stays in sync"
  vars:
    filePath: ".agents/skills/privacy-pools-integration/SKILL.md|||docs/static/agent-skills/privacy-pools-integration/SKILL.md"
  assert:
    - type: javascript
      value: |
        const { left, right } = JSON.parse(String(output));
        const pass = left === right;
        return {
          pass,
          score: pass ? 1 : 0,
          reason: pass ? 'Integration skill mirror matches' : 'Integration skill mirror differs',
        };

