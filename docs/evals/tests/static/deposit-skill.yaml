# Static checks for the deposit skill file.
# The custom provider reads the repo-local hosted copy; assertions check for required patterns.

- description: "Deposit skill mentions minimum deposit"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-deposit/SKILL.md"
  assert:
    - type: icontains-any
      value:
        - "minimum deposit"
        - "MinimumDepositAmount"

- description: "Deposit skill mentions Deposited event"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-deposit/SKILL.md"
  assert:
    - type: contains
      value: "Deposited"

- description: "Deposit skill mentions label"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-deposit/SKILL.md"
  assert:
    - type: contains
      value: "label"

- description: "Deposit skill mentions committedValue"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-deposit/SKILL.md"
  assert:
    - type: icontains-any
      value:
        - "committedValue"
        - "committed value"

- description: "Deposit skill mentions vetting fee"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-deposit/SKILL.md"
  assert:
    - type: icontains-any
      value:
        - "vetting fee"
        - "vettingFeeBPS"

- description: "Deposit skill mentions PrecommitmentAlreadyUsed error"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-deposit/SKILL.md"
  assert:
    - type: contains
      value: "PrecommitmentAlreadyUsed"

- description: "Deposit skill mentions migration-aware recovery"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-deposit/SKILL.md"
  assert:
    - type: icontains-any
      value:
        - "legacyAccount"
        - "migration"
        - "legacy"
