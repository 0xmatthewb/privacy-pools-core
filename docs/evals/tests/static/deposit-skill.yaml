# Static checks for the deposit skill file.
# Validates that SKILL.md contains required deposit-related content.

- description: "Deposit skill mentions minimum deposit"
  vars: {}
  assert:
    - type: javascript
      value: |
        const fs = require('fs');
        const path = require('path');
        const content = fs.readFileSync(
          path.resolve(__dirname, '../../../../static/agent-skills/privacy-pools-deposit/SKILL.md'),
          'utf-8'
        );
        const has = /minimum deposit|MinimumDepositAmount/i.test(content);
        return { pass: has, score: has ? 1 : 0, reason: has ? 'Found minimum deposit reference' : 'Missing "minimum deposit" or "MinimumDepositAmount"' };

