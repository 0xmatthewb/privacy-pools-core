# Static checks for the integration skill file.
# Validates that SKILL.md contains required content for integrators.

- description: "Integration skill mentions relayed withdrawal path"
  vars: {}
  assert:
    - type: javascript
      value: |
        const fs = require('fs');
        const path = require('path');
        const content = fs.readFileSync(
          path.resolve(__dirname, '../../../../static/agent-skills/privacy-pools-integration/SKILL.md'),
          'utf-8'
        );
        const hasRelay = /relay/i.test(content);
        return { pass: hasRelay, score: hasRelay ? 1 : 0, reason: hasRelay ? 'Found relay reference' : 'Missing "relay" or "relayed withdrawal" reference' };

