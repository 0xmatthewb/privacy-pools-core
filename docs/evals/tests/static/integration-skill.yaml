# Static checks for the integration skill file.
# The custom provider reads the repo-local hosted copy; assertions check for required patterns.

- description: "Integration skill mentions relayed withdrawal path"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-integration/SKILL.md"
  assert:
    - type: icontains
      value: "relay"

- description: "Integration skill references deposit skill or deposit docs"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-integration/SKILL.md"
  assert:
    - type: contains-any
      value:
        - "privacy-pools-deposit"
        - "/protocol/deposit"

- description: "Integration skill references withdraw skill or withdrawal docs"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-integration/SKILL.md"
  assert:
    - type: contains-any
      value:
        - "privacy-pools-withdraw"
        - "/protocol/withdrawal"

- description: "Integration skill links to ragequit docs"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-integration/SKILL.md"
  assert:
    - type: icontains
      value: "ragequit"

- description: "Integration skill mentions startBlock for event scans"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-integration/SKILL.md"
  assert:
    - type: icontains-any
      value:
        - "startBlock"
        - "deploymentBlock"

- description: "Integration skill mentions ASP root parity check"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-integration/SKILL.md"
  assert:
    - type: icontains-any
      value:
        - "ASP root"
        - "latestRoot"

- description: "Integration skill mentions mnemonic or pool account model"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-integration/SKILL.md"
  assert:
    - type: icontains-any
      value:
        - "mnemonic"
        - "pool account"

- description: "Integration skill differentiates production and testnet relayer hosts"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-integration/SKILL.md"
  assert:
    - type: contains
      value: "fastrelay.xyz"
    - type: contains
      value: "testnet-relayer.privacypools.com"

- description: "Integration skill mentions migration-aware recovery"
  vars:
    filePath: "docs/static/agent-skills/privacy-pools-integration/SKILL.md"
  assert:
    - type: icontains-any
      value:
        - "legacyAccount"
        - "migration"
        - "legacy"
