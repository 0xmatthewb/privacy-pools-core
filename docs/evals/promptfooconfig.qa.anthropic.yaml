# Privacy Pools - QA evaluation against docs context
# Tests LLM answers to protocol questions using docs as context.
# Run: yarn eval:qa:anthropic
# Requires ANTHROPIC_API_KEY env var.

description: "Privacy Pools - QA evaluation against docs context (Anthropic)"

providers:
  - id: anthropic:messages:claude-opus-4-6

prompts:
  - file://prompts/answer-from-context.txt

tests:
  - tests/qa/integration-qa.yaml
  - tests/qa/deposit-qa.yaml
  - tests/qa/withdrawal-qa.yaml
  - tests/qa/ragequit-qa.yaml
  - tests/qa/relayer-quote-qa.yaml
