name: Deploy docs

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    paths:
      - "docs/**"
      - ".agents/**"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "docs/agent-skills/**"
      - "docs/scripts/generate-agent-artifacts.mjs"
    branches:
      - dev

jobs:
  deploy-docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'Prod' || 'Dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: |
          cd docs
          yarn install --frozen-lockfile

      - name: Check generated agent artifacts
        run: |
          cd docs
          yarn check:agent-artifacts

      - name: Run static evals
        run: |
          cd docs
          yarn eval:static

      - name: Build website
        run: |
          cd docs
          yarn build

      - uses: amondnet/vercel-action@v25
        id: vercel-deployment
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }} # Required
          vercel-org-id: ${{ secrets.ORG_ID}} # Required
          scope: ${{ secrets.ORG_ID}} # Required
          vercel-args: '--prod'
          vercel-project-id: ${{ secrets.PROJECT_ID}} # Required

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            Preview: ${{ steps.vercel-deployment.outputs.preview-url }}
