name: Docs

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    paths:
      - "docs/**"
      - ".agents/**"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "docs/agent-skills/**"
      - "docs/scripts/generate-agent-artifacts.mjs"

jobs:
  validate:
    name: Validate docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: |
          cd docs
          yarn install --frozen-lockfile

      - name: Check generated agent artifacts
        run: |
          cd docs
          yarn check:agent-artifacts

      - name: Run static evals
        run: |
          cd docs
          yarn eval:static

      - name: Build website
        run: |
          cd docs
          yarn build

      - name: Run QA evals (OpenAI)
        if: env.OPENAI_API_KEY != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd docs
          yarn eval:qa:openai

      - name: Run QA evals (Anthropic)
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd docs
          yarn eval:qa:anthropic

  deploy:
    name: Deploy docs
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'Prod' || 'Dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: |
          cd docs
          yarn install --frozen-lockfile

      - name: Build website
        run: |
          cd docs
          yarn build

      - uses: amondnet/vercel-action@v25
        id: vercel-deployment
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          scope: ${{ secrets.ORG_ID }}
          vercel-args: ${{ github.ref_name == 'main' && '--prod' || '' }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}

  preview:
    name: Preview docs
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: |
          cd docs
          yarn install --frozen-lockfile

      - name: Build website
        run: |
          cd docs
          yarn build

      - uses: amondnet/vercel-action@v25
        id: vercel-deployment
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          scope: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            Preview: ${{ steps.vercel-deployment.outputs.preview-url }}
